name: Build world weather and deploy

on:
  workflow_dispatch:
    inputs:
      forecast_hours:
        description: "Horas GFS separadas por comas"
        required: true
        default: "0,3,6,9,12,15,18,21,24"
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: climate-world-pages
  cancel-in-progress: false

jobs:
  build:
    name: Generar datos globales
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Registrar parámetros
        run: |
          echo "Horas: ${{ inputs.forecast_hours }}"

      - name: Generar capas NOAA GFS
        env:
          FORECAST_HOURS: ${{ inputs.forecast_hours }}
        run: |
          python scripts/update_gfs.py --hours "$FORECAST_HOURS"

      - name: Validar sitio
        run: |
          python scripts/validate_site.py

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Crear artefacto de Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

  deploy:
    name: Publicar GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
