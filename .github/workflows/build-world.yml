name: Build world weather and deploy

on:
  workflow_dispatch:
    inputs:
      forecast_hours:
        description: "Horas GFS separadas por comas"
        required: true
        default: "0,3,6,9,12,15,18,21,24"
        type: string

permissions:
  contents: read

concurrency:
  group: climate-world-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Generar datos globales y publicar en Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Registrar parámetros
        run: |
          echo "Horas: ${{ inputs.forecast_hours }}"

      - name: Generar capas NOAA GFS
        env:
          FORECAST_HOURS: ${{ inputs.forecast_hours }}
        run: |
          python scripts/update_gfs.py --hours "$FORECAST_HOURS"

      - name: Validar sitio
        run: |
          python scripts/validate_site.py

      - name: Publicar en Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Falta el secret CLOUDFLARE_API_TOKEN."
            exit 1
          fi

          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Falta el secret CLOUDFLARE_ACCOUNT_ID."
            exit 1
          fi

          npx wrangler@latest pages deploy docs \
            --project-name=climate-world \
            --branch=main

          echo "Climate World publicado correctamente en Cloudflare Pages."
